# Fix slow startup
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# polykit agent
exec-once = systemctl --user start hyprpolkitagent

exec-once = pywalfox start

# wallpapers
exec-once = swww-daemon
# notification service
exec-once = dunst

# blue light filter
exec-once = wl-gammarelay-rs

# default 4500k
exec-once = sh -c "wl-gammarelay-rs & sleep 2; busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 4500"

# clipboard
exec-once = wl-clip-persist --clipboard regular --display wayland-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# I dont need waybar at start
#exec-once = waybar