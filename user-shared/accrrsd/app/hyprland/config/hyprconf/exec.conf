# Fix slow startup
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP GTK_THEME
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP GTK_THEME QT_QPA_PLATFORMTHEME

# polykit agent
exec-once = systemctl --user start hyprpolkitagent

# firefox themes
exec-once = pywalfox start

# wallpapers
exec-once = awww-daemon

# blue light filter — starts daemon and sets temperature after 2s delay
exec-once = sh -c "wl-gammarelay-rs & sleep 2; busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 5000"

# clipboard
exec-once = wl-clip-persist --clipboard regular --display wayland-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ags (like DE interface)
exec-once = ags run